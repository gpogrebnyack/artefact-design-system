name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # Real backstop: catches drift even if a local pre-commit hook was
      # bypassed (--no-verify) or never installed after a fresh clone.
      - run: npm run build
